name: Daily Reads

on:
  schedule:
    - cron: '0 1 * * *'  # 09:00 MYT (UTC+8) every day
  workflow_dispatch:       # allow manual trigger from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to push the updated daily_reads.md

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install openai feedparser

      - name: Generate daily entry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/generate_entry.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_reads.md
          git diff --cached --quiet && echo "No changes to commit." || \
            git commit -m "chore: daily reads $(TZ=Asia/Kuala_Lumpur date +%Y-%m-%d)" && \
            git push
